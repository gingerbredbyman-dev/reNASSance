<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Ccircle cx='48' cy='48' r='44' fill='%23221B14' stroke='%23E9AE58' stroke-width='5'/%3E%3Crect x='34' y='34' width='28' height='28' fill='%23E9AE58'/%3E%3Crect x='34' y='34' width='28' height='28' fill='%23E9AE58' transform='rotate(45 48 48)'/%3E%3C/svg%3E">
<title>The RenNASSance</title>
<style>
  :root{--ink:#221B14;--sand:#F0E6D2;--dim:#BCAA8C;--gold:#E9AE58;--rose:#DE7E68;--surface:#2C241B;--line:rgba(233,174,88,.22)}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse 130% 62% at 50% 112%, rgba(233,174,88,.24), rgba(222,126,104,.10) 45%, transparent 72%), #221B14;
    color:var(--sand);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:24px;-webkit-font-smoothing:antialiased}
  .gate{width:100%;max-width:330px;text-align:center}
  .logo{filter:drop-shadow(0 0 18px rgba(233,174,88,.4));margin-bottom:16px}
  .the{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-style:italic;color:var(--dim);font-size:16px}
  h1{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-weight:600;font-size:36px;margin:2px 0 10px;letter-spacing:.01em}
  h1 .nass{color:var(--gold)}
  p.hint{color:var(--dim);font-size:14px;margin:0 0 22px;line-height:1.5}
  form{display:flex;flex-direction:column;gap:11px}
  input{font-size:16px;padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:var(--surface);color:var(--sand);text-align:center;letter-spacing:.03em}
  input::placeholder{color:#7d6f58}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(233,174,88,.14)}
  button{font-size:15px;font-weight:700;padding:14px;border:0;border-radius:12px;cursor:pointer;letter-spacing:.02em;
    color:#221B14;background:linear-gradient(120deg,var(--gold),var(--rose));box-shadow:0 4px 22px rgba(233,174,88,.28);transition:transform .12s ease}
  button:active{transform:scale(.97)}
  .err{color:var(--rose);font-size:13px;min-height:18px}
  .shake{animation:sh .38s}
  @keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
  .working{opacity:.55;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.shake{animation:none}}
</style>
</head>
<body>
<div class="gate" id="gate">
  <svg class="logo" width="76" height="76" viewBox="0 0 96 96" aria-hidden="true">
    <defs><clipPath id="sky"><rect x="0" y="0" width="96" height="60"/></clipPath></defs>
    <circle cx="48" cy="48" r="45" fill="none" stroke="#E9AE58" stroke-width="2"/>
    <g clip-path="url(#sky)"><rect x="34" y="46" width="28" height="28" fill="#E9AE58" opacity=".95"/><rect x="34" y="46" width="28" height="28" fill="#E9AE58" transform="rotate(45 48 60)"/></g>
    <line x1="14" y1="60" x2="82" y2="60" stroke="#E9AE58" stroke-width="2"/>
    <line x1="48" y1="22" x2="48" y2="30" stroke="#DE7E68" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="31" x2="32" y2="37" stroke="#DE7E68" stroke-width="2" stroke-linecap="round"/>
    <line x1="69" y1="31" x2="64" y2="37" stroke="#DE7E68" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div class="the">the</div>
  <h1>Ren<span class="nass">NASS</span>ance</h1>
  <p class="hint">This one's just for Nass.<br>Enter the word to come in.</p>
  <form id="f">
    <input id="pw" type="password" autocomplete="current-password" placeholder="the word" aria-label="password" autofocus>
    <button type="submit" id="go">Unlock &rarr;</button>
    <div class="err" id="err" role="alert"></div>
  </form>
</div>
